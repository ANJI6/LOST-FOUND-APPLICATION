<html lang="en">
<head>

    <title>My Reports - Lost & Found Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

            <a class="navbar-brand fw-bold" href="dashboard.html">🔍 Lost & Found</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="my-reports.html">My Reports</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="h2 fw-bold mb-4">My Reports</h1>

            <li class="nav-item">
                <a class="nav-link" id="found-tab" data-bs-toggle="tab" href="#found" role="tab">Found Items (1)</a>

        </ul>

        <div class="tab-content" id="reportTabsContent">
            <div class="tab-pane fade show active" id="lost" role="tabpanel">
                <div class="row g-4">
                    <!-- Your reported lost items -->
                    <div class="col-lg-6">
                        <div class="card border-start border-danger border-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h6>Black Wallet</h6>
                                    <span class="badge bg-warning">Pending</span>
                                </div>
                                <p class="small text-muted">Library • Reported 2h ago</p>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-primary">Edit</button>
                                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="found" role="tabpanel">
                <!-- Your reported found items -->
            </div>
