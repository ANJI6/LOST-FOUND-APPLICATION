<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item - Lost & Found Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .report-card { border: 2px dashed #51cf66; background: #f0fff4; }
    </style>
</head>
<body>
    <!-- Similar structure to report-lost.html but green theme -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">🔍 Lost & Found</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card report-card shadow-lg">
                    <div class="card-header bg-success text-white text-center py-4">
                        <i class="fas fa-check-circle fa-3x mb-3"></i>
                        <h2 class="mb-0">Report Found Item</h2>
                    </div>
                    <div class="card-body p-5">
                        <!-- Same form structure as report-lost.html but green buttons -->
                        <form class="report-form needs-validation" novalidate>
                            <!-- Form fields identical to report-lost.html -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg fw-bold py-3">
                                    <i class="fas fa-paper-plane me-2"></i>Report Found Item
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
