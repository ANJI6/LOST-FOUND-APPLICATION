<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item - Lost & Found Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .report-card { border: 2px dashed #ff6b6b; background: #fff5f5; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">🔍 Lost & Found</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="lost-items.html">Lost Items</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card report-card shadow-lg">
                    <div class="card-header bg-danger text-white text-center py-4">
                        <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                        <h2 class="mb-0">Report Lost Item</h2>
                    </div>
                    <div class="card-body p-5">
                        <form class="report-form needs-validation" novalidate>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold">Item Name *</label>
                                    <input type="text" class="form-control" placeholder="e.g. Black wallet" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold">Category *</label>
                                    <select class="form-select" required>
                                        <option value="">Select category</option>
                                        <option value="wallet">Wallet</option>
                                        <option value="keys">Keys</option>
                                        <option value="phone">Phone</option>
                                        <option value="laptop">Laptop</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold">Location Lost *</label>
                                    <input type="text" class="form-control" placeholder="e.g. Library entrance" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold">Date & Time *</label>
                                    <input type="datetime-local" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Description</label>
                                <textarea class="form-control" rows="4" placeholder="Add more details..."></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Upload Photo</label>
                                <input type="file" class="form-control" accept="image/*">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-danger btn-lg fw-bold py-3">
                                    <i class="fas fa-paper-plane me-2"></i>Report Lost Item
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
