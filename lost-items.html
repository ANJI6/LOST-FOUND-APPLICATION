<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Items - Lost & Found Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .item-card { border-left: 5px solid #ff6b6b; transition: all 0.3s; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-badge { font-size: 0.8rem; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-search text-primary me-2"></i>Lost & Found
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="my-reports.html">My Reports</a>
                <a class="nav-link active" href="lost-items.html">Lost Items</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h2 fw-bold text-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>Lost Items
                    </h1>
                    <a href="report-lost.html" class="btn btn-danger btn-lg">
                        <i class="fas fa-plus me-2"></i>Report Lost Item
                    </a>
                </div>

                <div class="row g-4">
                    <!-- Item Card 1 -->
                    <div class="col-lg-4 col-md-6">
                        <div class="card item-card h-100">
                            <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                                <i class="fas fa-wallet fa-4x text-muted"></i>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">Black Leather Wallet</h5>
                                <p class="card-text">
                                    <i class="fas fa-map-marker-alt me-1 text-muted"></i>
                                    Library Entrance • 2 hours ago
                                </p>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge bg-danger status-badge">LOST</span>
                                    <small class="text-muted">John Doe</small>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-eye"></i> View
                                    </button>
                                    <button class="btn btn-primary btn-sm">
                                        <i class="fas fa-bell"></i> Notify Me
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Item Card 2 -->
                    <div class="col-lg-4 col-md-6">
                        <div class="card item-card h-100">
                            <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                                <i class="fas fa-key fa-4x text-muted"></i>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">House Keys</h5>
                                <p class="card-text">
                                    <i class="fas fa-map-marker-alt me-1 text-muted"></i>
                                    Parking Lot B • 5 hours ago
                                </p>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge bg-danger status-badge">LOST</span>
                                    <small class="text-muted">Sarah Wilson</small>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-eye"></i> View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- More item cards... (repeat pattern) -->
                    <div class="col-lg-4 col-md-6">
                        <div class="card item-card h-100">
                            <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                                <i class="fas fa-laptop fa-4x text-muted"></i>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">MacBook Pro</h5>
                                <p class="card-text">
                                    <i class="fas fa-map-marker-alt me-1 text-muted"></i>
                                    Lecture Hall 101 • 1 day ago
                                </p>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge bg-warning status-badge">LOST</span>
                                    <small class="text-muted">Mike Chen</small>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-eye"></i> View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
